<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>GPX轉換器</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 700px;
    margin: 40px auto;
    padding: 1em;
    font-size: clamp(14px, 2.8vw, 20px);
    line-height: 1.6;
}

textarea {
    width: 100%;
    height: 260px;
    font-size: 1em;
    padding: 0.8em;
    box-sizing: border-box;
}

.file-btn {
  	display: inline-block;
	padding: 12px 20px;
	font-size: 24px;
	font-weight: 500;
	color: white;
	text-decoration: none;
	background: linear-gradient(180deg, #0a84ff, #0066ff);
	border-radius: 14px;
	cursor: pointer;
	box-shadow: 0 4px 10px rgba(0,0,0,0.2);
	transition: all 0.2s ease;
	position: relative;
}
/* hover */
.file-btn:hover {
	transform: translateY(-1px);
	box-shadow: 0 6px 14px rgba(0,0,0,0.25);
}

/* 點擊 */
.file-btn:active {
	transform: scale(0.97);
	box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

/* iOS光澤 */
.file-btn::after {
	content: "";
	position: absolute;
	inset: 0;
	border-radius: 14px;
	background: linear-gradient(180deg, rgba(255,255,255,0.25), transparent);
	pointer-events: none;
}
.file-btn input {
    display: none;
}

button {
    font-size: 1em;
    padding: 0.7em 1.4em;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
}

input[type="text"] {
    width: 100%;

    margin-top: 10px;
    font-size: 1em;
    box-sizing: border-box;
}

#fileName {
   margin-top: 8px;
	color: #666;
	font-size: 0.95em;
}
/* iPhone 風格開關 */
.switch {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
}

.switch input {
    display: none;
}

.slider {
    position: relative;
    width: 46px;
    height: 26px;
    background-color: #ccc;
    border-radius: 34px;
    transition: 0.3s;
}

.slider::before {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    left: 3px;
    top: 3px;
    background-color: white;
    border-radius: 50%;
    transition: 0.3s;
}
/* 打開狀態 */
.switch input:checked + .slider {
    background-color: #34c759; /* iOS 綠 */
}

.switch input:checked + .slider::before {
    transform: translateX(20px);
	
}
 .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0, 0, 0, 0.85);
    color: #fff;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 0.95em;
    opacity: 0;
    pointer-events: none;
    transition: all 0.4s ease;
    z-index: 9999;
}

/* 顯示狀態 */
.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
.toast.success { background: #28a745; }
.toast.error { background: #dc3545; }
.toast.warn { background: #ffc107; color:#000; }
.toast.info {    background: #000;     color: white;  }
.header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 20px; padding-bottom: 14px;
    border-bottom: 2px solid var(--border);
  }
 .header-text span {
    font-size: clamp(20px, 1.5vw, 13px);
    color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
  }
   
   .header-text h2 {
    font-size: clamp(40px, 3vw, 26px);
    font-weight: 700; color: var(--green-dark); line-height: 1.2;
  }
  .ios-btn {
	display: inline-block;
	margin-top: 10px;
	padding: 12px 20px;
	font-size: 16px;
	font-weight: 500;
	color: white;
	background: linear-gradient(180deg, #0a84ff, #0066ff);
	border-radius: 14px;
	border: none;
	cursor: pointer;
	text-align: center;

	box-shadow: 0 4px 10px rgba(0,0,0,0.2);
	transition: all 0.2s ease;
	position: relative;
}

/* hover */
.ios-btn:hover {
	transform: translateY(-1px);
	box-shadow: 0 6px 14px rgba(0,0,0,0.25);
}

/* 點擊 */
.ios-btn:active {
	transform: scale(0.96);
	box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

/* iOS 光澤 */
.ios-btn::after {
	content: "";
	position: absolute;
	inset: 0;
	border-radius: 14px;
	background: linear-gradient(180deg, rgba(255,255,255,0.25), transparent);

.ios-btn:focus {

}
/* 灰色按鈕（清空用） */
.ios-btn-gray {
	background: linear-gradient(180deg, #8e8e93, #6c6c70);
}

}
.form-group {

}

.form-group label {
    font-size: 0.9em;

<body>
<div class="header">
	<div class="header-text">
		<h2>GPX轉換助手</h2>
		<span>蘋果專用：GPX轉換助手捷徑腳本</span>
		<br>
		<a href="https://www.icloud.com/shortcuts/ac049041770e435e8f1ee50bef45a39c" 
		   target="_blank" 
		   class="ios-btn">
			下載捷徑
		</a>
	</div>
</div>

  <label class="file-btn">
    選擇GPX檔案或座標文字檔
    <input type="file" id="fileInput">
  </label>


<div id="fileName"></div>
<div id="stats" style="margin-top:10px;color:#333;"></div>
<input type="text" id="fileNameInput" placeholder="輸出檔名（可不填）">
<label class="switch">
  <input type="checkbox" id="circleMode">
  <span class="slider"></span>
  種花模式(繞圈)
</label>
<div class="form-group">
<input type="text" id="radiusInput" placeholder="種花半徑（公尺，例如：30）" value="30">
<label for="radiusInput" class="text">
  種花半徑（公尺，例如：30）
 </label>
 </div>
 <div class="form-group">
<input type="text" id="pointnum" placeholder="種花路徑點數量（例如：6）" value="6">
<label for="pointnum"  class="text">
  種花路徑點數量（例如：6）
 </label>
 </div>
<textarea id="inputText" placeholder="支援的座標格式：
1. 24.123,121.456 路徑點名稱
2. 24.123,121.456 (換行)路徑點名稱 
3. 路徑點名稱(換行)24.123,121.456
4. (24.123,121.456)
5. 北24.123° 東121.456°
6. 24.123° N, 121.456° E
7. 其他GPX格式，可直接讀檔"></textarea><br>

<div class="toast" id="toast"></div>

<button class="ios-btn" onclick="convert()">轉換並下載</button>
<button class="ios-btn" onclick="reviewmap()">預覽路徑</button>
<button class="ios-btn ios-btn-gray" class="btn-select-all" onclick="clearCoords()">清空座標</button>
   
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>



<script>
let originalFileName = "";
let map, polyline;
//處理解碼
function parseInput(text) {
    let points = [];

  if (text.startsWith("<")) {
        let xml = new DOMParser().parseFromString(text, "text/xml");

        xml.querySelectorAll("trkpt, rtept, wpt").forEach(p => {
            points.push({
                lat: p.getAttribute("lat"),
                lon: p.getAttribute("lon"),
                name: ""
            });
        });

    } else {
        let lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l);

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i];

            let lat = null, lon = null, name = "";

            let match = line.match(/^(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)(?:\s+(.*))?/);
            if (match) {
                lat = match[1];
                lon = match[2];
                name = match[3] ? match[3].trim() : "";
            }

            if (!lat) {
                let match2 = line.match(/^\(?\s*(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)\s*\)?(?:\s+(.*))?/);
                if (match2) {
                    lat = match2[1];
                    lon = match2[2];
                    name = match2[3] ? match2[3].trim() : "";
                }
            }

            if (!lat) {
                let match3 = line.match(/([北南])\s*(\d+(?:\.\d+)?)°?\s*([東西])\s*(\d+(?:\.\d+)?)°?(?:\s+(.*))?/);
                if (match3) {
                    let latDir = match3[1];
                    let latVal = parseFloat(match3[2]);
                    let lonDir = match3[3];
                    let lonVal = parseFloat(match3[4]);

                    lat = (latDir === "南") ? -latVal : latVal;
                    lon = (lonDir === "西") ? -lonVal : lonVal;
                    name = match3[5] ? match3[5].trim() : "";
                }
            }

            if (!lat) {
                let match4 = line.match(/(\d+(?:\.\d+)?)°?\s*([NS])\s*,\s*(\d+(?:\.\d+)?)°?\s*([EW])(?:\s+(.*))?/i);
                if (match4) {
                    let latVal = parseFloat(match4[1]);
                    let latDir = match4[2].toUpperCase();
                    let lonVal = parseFloat(match4[3]);
                    let lonDir = match4[4].toUpperCase();

                    lat = (latDir === "S") ? -latVal : latVal;
                    lon = (lonDir === "W") ? -lonVal : lonVal;
                    name = match4[5] ? match4[5].trim() : "";
                }
            }

          if (lat !== null && lon !== null) {

			// ✅ 新增：名稱在「前一行」
			if (!name && i > 0 && !lines[i - 1].match(/^\(?\s*-?\d/)) {
				name = lines[i - 1].trim();
			}

			// 原本：名稱在「下一行」
			if (!name && i + 1 < lines.length && !lines[i + 1].match(/^\(?\s*-?\d/)) {
				name = lines[i + 1].trim();
				i++;
			}

			points.push({ lat, lon, name });
}
        }
    }

    return points;
}
//處理種花
function applyCircle(points) {
    let pointnum = parseFloat(document.getElementById("pointnum")?.value);
    let circleMode = document.getElementById("circleMode")?.checked;
    let radius = parseFloat(document.getElementById("radiusInput")?.value);

    if (!circleMode) return points;

    if (isNaN(pointnum) || pointnum < 3) {
        showToast("種花點數至少要 3", 0, "error");
        return null;
    }

    if (isNaN(radius) || radius <= 0) {
        showToast("半徑需為正數", 0, "error");
        return null;
    }

    let newPoints = [];

    points.forEach(p => {
        let circle = generatePentagon(parseFloat(p.lat), parseFloat(p.lon), radius, pointnum);

        circle.forEach((pt, idx) => {
            newPoints.push({
                lat: pt.lat,
                lon: pt.lon,
                name: p.name ? `${p.name}_${idx+1}` : ""
            });
        });
    });

    return newPoints;
}
// ════════════════════════════════════════════
// UI 工具
// ════════════════════════════════════════════
function showToast(msg, delay=0, type="success") {
  setTimeout(() => {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show', type);  // 動態加入類別
    setTimeout(() => t.classList.remove('show', type), 2400);
  }, delay);
}
// ======清除
function clearCoords() {
  const el = document.getElementById('inputText');
  if (!el.value.trim()) return showToast('座標是空的',0, "info");
  el.value = '';
  el.focus();
  document.getElementById('inputText').classList.remove('show');
  showToast('已清空',0, "info");
}
// ===== 建立地圖（不影響UI，用JS插入）=====
function initMap() {
    if (map) return;

    let mapDiv = document.createElement("div");
    mapDiv.id = "map";
    mapDiv.style.height = "400px";
    mapDiv.style.marginTop = "20px";

    document.body.appendChild(mapDiv);

    map = L.map("map").setView([23.7, 121], 7);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19
    }).addTo(map);
}

// ===== 讀檔 =====
document.getElementById("fileInput").addEventListener("change", function(e) {
    let file = e.target.files[0];
    if (!file) return;

    originalFileName = file.name.replace(/\.gpx$/i, "");
    document.getElementById("fileName").textContent = "已選檔案：" + file.name;

    let reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById("inputText").value = e.target.result;
    };
    reader.readAsText(file);
});

// ===== 去重 =====
//function removeDuplicate(points) {
    //let seen = new Set();
    //let duplicateCount = 0;

   // let unique = points.filter(p => {
       // let key = `${parseFloat(p.lat).toFixed(8)},${parseFloat(p.lon).toFixed(8)}`;
        //if (seen.has(key)) {
          //  duplicateCount++;
           // return false;
       // }
       // seen.add(key);
        //return true;
   // });

    //return { unique, duplicateCount };
//}
// ===== 種花繞圈 =====
function generatePentagon(lat, lon, radius,pointnum) {
    let result = [];

    let startAngle = -90; // 讓圖形比較自然（上方開始）
	let angleStep = 360 / pointnum;

    for (let i = 0; i < pointnum; i++) {
       let angle = (startAngle + i * angleStep) * Math.PI / 180;

        let dx = radius * Math.cos(angle);
        let dy = radius * Math.sin(angle);

        let newLat = lat + (dy / 111320);
        let newLon = lon + (dx / (111320 * Math.cos(lat * Math.PI / 180)));

        result.push({
            lat: newLat.toFixed(8),
            lon: newLon.toFixed(8)
        });
    }

    // 關閉路徑
    result.push(result[0]);

    return result;
}
// ===== 去除連續重複點 =====
function removeDuplicate(points) {
    let duplicateCount = 0;

    let unique = points.filter((p, index, arr) => {
        if (index === 0) return true;

        let prev = arr[index - 1];

        let keyCurrent = `${parseFloat(p.lat).toFixed(6)},${parseFloat(p.lon).toFixed(6)}`;
        let keyPrev = `${parseFloat(prev.lat).toFixed(6)},${parseFloat(prev.lon).toFixed(6)}`;

        if (keyCurrent === keyPrev) {
            duplicateCount++;
            return false;
        }

        return true;
    });

    return { unique, duplicateCount };
}
let markerGroup;
// ===== 畫地圖 =====
function drawMap(points) {
    initMap();

    if (polyline) {
        map.removeLayer(polyline);
    }

    if (markerGroup) {
        map.removeLayer(markerGroup);
    }

    markerGroup = L.layerGroup().addTo(map);

    let latlngs = [];

    points.forEach(p => {
        let lat = parseFloat(p.lat);
        let lon = parseFloat(p.lon);

        let marker = L.marker([lat, lon]);
        if (p.name) marker.bindPopup(p.name);

        markerGroup.addLayer(marker);

        latlngs.push([lat, lon]);
    });

    polyline = L.polyline(latlngs, {color: 'red'}).addTo(map);

    if (latlngs.length > 0) {
        map.fitBounds(latlngs);
    }
}
function reviewmap(){
 let text = document.getElementById("inputText").value.trim();
	let points = parseInput(text);
	 if (points.length === 0) {
	showToast("沒有抓到任何座標！", 0, "error");
        //alert("沒有抓到任何座標！");
        return;
    }

    // ===== 統計 + 去重 =====
	let originalCount = points.length;
	let result = removeDuplicate(points);
	let uniquePoints = result.unique;
	uniquePoints = applyCircle(uniquePoints);
	if (!uniquePoints) return;
	let duplicateCount = result.duplicateCount;
	let finalCount = uniquePoints.length;

document.getElementById("stats").innerHTML =
    `原始點數: ${originalCount} ｜ 轉換後點數: ${finalCount} ｜ 重複點數: ${duplicateCount}`;

    // ===== 畫地圖 =====
    drawMap(uniquePoints);

}
// ===== 轉換 =====
function convert() {
    let text = document.getElementById("inputText").value.trim();
 	let points = parseInput(text);
    if (points.length === 0) {
	showToast("沒有抓到任何座標！", 0, "error");
        //alert("沒有抓到任何座標！");
        return;
    }

    // ===== 統計 + 去重 =====
	let originalCount = points.length;
	let result = removeDuplicate(points);
	let uniquePoints = result.unique;
	uniquePoints = applyCircle(uniquePoints);
	if (!uniquePoints) return;
	
	let duplicateCount = result.duplicateCount;
	let finalCount = uniquePoints.length;

document.getElementById("stats").innerHTML =
    `原始點數: ${originalCount} ｜ 轉換後點數: ${finalCount} ｜ 重複點數: ${duplicateCount}`;

    // ===== 畫地圖 =====
    drawMap(uniquePoints);

    // ===== 生成 GPX（保持你原本格式）=====
    let gpx = `<?xml version="1.0" encoding="utf-8"?>
<gpx version="1.1" creator="by JCC" xmlns="http://www.topografix.com/GPX/1/1">
`;

    uniquePoints.forEach(p => {
        gpx += `  <wpt lat="${p.lat}" lon="${p.lon}">
`;
        if (p.name) {
            let safeName = p.name.replace(/]]>/g, "]]]]><![CDATA[>");
            gpx += `    <name><![CDATA[${safeName}]]></name>
`;
        }
        gpx += `  </wpt>
`;
    });

    gpx += "</gpx>";

    let inputName = document.getElementById("fileNameInput").value.trim();
    let finalName = "";

    if (inputName) {
        finalName = inputName;
    } else if (originalFileName) {
        finalName = originalFileName + "_convert";
    } else {
        finalName = "converted";
    }

    let blob = new Blob([gpx], { type: "application/gpx+xml" });

    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = finalName + ".gpx";
	a.target = "_blank";
    a.click();
	   showToast("轉換成功！下載已開始", 0, "success");
}
// ===== API轉換（給捷徑用）=====
async function convertByAPI() {
    let text = document.getElementById("inputText").value.trim();
    if (!text) return;

    let inputName = document.getElementById("fileNameInput").value.trim();

    let finalName = "";
    if (inputName) {
        finalName = inputName;
    } else if (originalFileName) {
        finalName = originalFileName + "_convert";
    } else {
        finalName = "converted";
    }

    let res = await fetch("/api/convert", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            text: text,
            filename: finalName,
            circleMode: document.getElementById("circleMode")?.checked,
            radius: parseFloat(document.getElementById("radiusInput")?.value),
            pointnum: parseFloat(document.getElementById("pointnum")?.value)
        })
    });

    if (!res.ok) {
        alert("API錯誤");
        return;
    }

    let blob = await res.blob();

    let a = document.createElement("a");
    //a.href = URL.createObjectURL(blob);
	let url = URL.createObjectURL(blob);
	a.href = url;
	
	
    a.download = finalName + ".gpx";
    a.target = "_blank"; // iPhone 修正
    a.click();
	setTimeout(() => URL.revokeObjectURL(url), 1000);
}
// ===== 捷徑專用入口 =====
window.addEventListener("load", async () => {
    const params = new URLSearchParams(window.location.search);

    let auto = params.get("auto");
    let data = params.get("data");

    //  1. URL帶資料（少量）
    if (data) {
        document.getElementById("inputText").value = decodeURIComponent(data);
    }

    //  2. Clipboard（大量資料）
    if (!data && auto === "1") {
        try {
            const clip = await navigator.clipboard.readText();
            if (clip) {
                document.getElementById("inputText").value = clip;
            }
        } catch (e) {}
    }

    //  3. 自動轉換（只給捷徑用）
    if (auto === "1") {
        setTimeout(() => {
            convertByAPI(); // ⚡ 不用原本 convert()
        }, 500);
    }
});
</script>
