<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>GPX轉換器</title>
<style>
body {
    font-family: Arial, sans-serif;
    max-width: 700px;
    margin: 40px auto;
    padding: 20px;
}
textarea {
    width: 100%;
    height: 260px;
}
button {
    padding: 10px 20px;
    margin-top: 10px;
    cursor: pointer;
}
</style>
</head>
<body>

<h2>GPX轉換器（完整強化版）</h2>

<input type="file" id="fileInput"><br><br>

<textarea id="inputText" placeholder="貼上資料：
1. 24.123,121.456 寶可夢補給點、道館名稱、皮克敏菇菇名稱
2. 24.123,121.456
   名稱
3. 24.123,121.456
4. GPX內容"></textarea><br>

<button onclick="convert()">轉換並下載</button>

<script>
function convert() {
    let text = document.getElementById("inputText").value.trim();
    let points = [];
    let gpxName = "GPX轉換結果";

    // ===== GPX XML =====
    if (text.startsWith("<")) {
        let parser = new DOMParser();
        let xml = parser.parseFromString(text, "text/xml");

        let nameNode = xml.querySelector("name");
        if (nameNode) gpxName = nameNode.textContent;

        xml.querySelectorAll("trkpt, rtept").forEach(p => {
            points.push({
                lat: p.getAttribute("lat"),
                lon: p.getAttribute("lon"),
                name: ""
            });
        });

    } else {
        // ===== 文字模式 =====
        let lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l);

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i];

            // 嘗試抓座標
            let match = line.match(/^(-?\d+(\.\d+)?)\s*,\s*(-?\d+(\.\d+)?)$/);

            if (match) {
                let lat = match[1];
                let lon = match[3];
                let name = "";

                // 下一行如果不是座標 → 當名稱
                if (i + 1 < lines.length && !lines[i + 1].match(/^(-?\d+(\.\d+)?)\s*,/)) {
                    name = lines[i + 1];
                    i++; // 跳過名稱行
                }

                points.push({ lat, lon, name });

            } else {
                // 嘗試同一行格式
                let match2 = line.match(/^(-?\d+(\.\d+)?)\s*,\s*(-?\d+(\.\d+)?)(?:\s+(.*))?$/);

                if (match2) {
                    points.push({
                        lat: match2[1],
                        lon: match2[3],
                        name: match2[5] ? match2[5].trim() : ""
                    });
                } else {
                    console.log("無法解析:", line);
                }
            }
        }
    }

    if (points.length === 0) {
        alert("沒有抓到任何座標！");
        return;
    }

    let gpx = `<?xml version="1.0" encoding="utf-8"?>
<gpx version="1.1" creator="by JCC" xmlns="http://www.topografix.com/GPX/1/1">
  <name>${gpxName}</name>
`;

    points.forEach(p => {
        gpx += `  <wpt lat="${p.lat}" lon="${p.lon}">
`;
        if (p.name) {
            gpx += `    <name>${p.name}</name>
`;
        }
        gpx += `  </wpt>
`;
    });

    gpx += "</gpx>";

    let blob = new Blob([gpx], { type: "application/xml" });
	let a = document.createElement("a");
	a.href = URL.createObjectURL(blob);
	a.download = "converted.gpx";
	a.click();
}

// ===== 檔案讀取 =====
document.getElementById("fileInput").addEventListener("change", function(e) {
    let file = e.target.files[0];
    if (!file) return;

    let reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById("inputText").value = e.target.result;
    };
    reader.readAsText(file);
});
</script>

</body>
</html>
