<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>GPX轉換器</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 700px;
    margin: 40px auto;
    padding: 1em;
    font-size: clamp(14px, 2.8vw, 20px);
    line-height: 1.6;
}

textarea {
    width: 100%;
    height: 260px;
    font-size: 1em;
    padding: 0.8em;
    box-sizing: border-box;
}

.file-btn {
    display: inline-block;
    font-size: 1.1em;
    padding: 0.8em 1.4em;
    border-radius: 10px;
    background-color: #007bff;
    color: white;
    cursor: pointer;
    text-align: center;
    margin-bottom: 10px;
}

.file-btn input {
    display: none;
}

button {
    font-size: 1em;
    padding: 0.7em 1.4em;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
}

input[type="text"] {
    width: 100%;
    padding: 0.5em;
    margin-top: 10px;
    font-size: 1em;
    box-sizing: border-box;
}

#fileName {
    margin-top: 5px;
    color: #555;
}
</style>

</head>
<body>

<h2>GPX轉換器（完整版）</h2>

<label class="file-btn">
  選擇GPX檔案
  <input type="file" id="fileInput">
</label>

<div id="fileName"></div>

<input type="text" id="fileNameInput" placeholder="輸出檔名（可不填）">

<textarea id="inputText" placeholder="建議座標資料：
1. 24.123,121.456 寶可夢(補給點、道館名稱)、皮克敏(菇菇)
2. 24.123,121.456(換行)
   +名稱
3. 24.123,121.456(純座標)
4. 其他GPX檔案格式，使用讀檔"></textarea><br>

<button onclick="convert()">轉換並下載</button>

<script>
let originalFileName = "";

// ===== 檔案讀取 =====
document.getElementById("fileInput").addEventListener("change", function(e) {
    let file = e.target.files[0];
    if (!file) return;

    originalFileName = file.name.replace(/\.gpx$/i, "");
    document.getElementById("fileName").textContent = "已選檔案：" + file.name;

    let reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById("inputText").value = e.target.result;
    };
    reader.readAsText(file);
});

// ===== 轉換 =====
function convert() {
    let text = document.getElementById("inputText").value.trim();
    let points = [];

    // ===== GPX =====
    if (text.startsWith("<")) {
        let parser = new DOMParser();
        let xml = parser.parseFromString(text, "text/xml");

        xml.querySelectorAll("trkpt, rtept").forEach(p => {
            points.push({
                lat: p.getAttribute("lat"),
                lon: p.getAttribute("lon"),
                name: ""
            });
        });

    } else {
        let lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l);

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i];

            // 👉 抓座標（最穩寫法）
            let match = line.match(/^(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)/);

            if (match) {
                let lat = match[1];
                let lon = match[2];
                let name = "";

                // 下一行不是座標 → 當名稱
                if (i + 1 < lines.length && !lines[i + 1].match(/^(-?\d+(?:\.\d+)?)\s*,/)) {
                    name = lines[i + 1];
                    i++;
                }

                points.push({ lat, lon, name });
            }
        }
    }

    if (points.length === 0) {
        alert("沒有抓到任何座標！");
        return;
    }

    // ===== 生成 GPX =====
    let gpx = `<?xml version="1.0" encoding="utf-8"?>
<gpx version="1.1" creator="by JCC" xmlns="http://www.topografix.com/GPX/1/1">
`;

    points.forEach(p => {
        gpx += `  <wpt lat="${p.lat}" lon="${p.lon}">
`;
        if (p.name) {
            gpx += `    <name>${p.name}</name>
`;
        }
        gpx += `  </wpt>
`;
    });

    gpx += "</gpx>";

    // ===== 檔名邏輯 =====
    let inputName = document.getElementById("fileNameInput").value.trim();
    let finalName = "";

    if (inputName) {
        finalName = inputName;
    } else if (originalFileName) {
        finalName = originalFileName + "_convert";
    } else {
        finalName = "converted";
    }

    let blob = new Blob([gpx], { type: "application/xml" });

    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = finalName + ".gpx";
    a.click();
}
</script>

</body>
</html>
